<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>القرآن الكريم</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Amiri+Quran&family=Amiri:wght@400;700&family=Tajawal:wght@300;400;500;700;900&family=Cormorant+Garamond:ital@0;1&display=swap" rel="stylesheet">
<style>
  :root{
    --emerald-deep:#0f3d2e;
    --emerald:#1b5e46;
    --sage:#dde8df;
    --parchment:#fbf6ec;
    --parchment-2:#f4ecd9;
    --gold:#c8932b;
    --gold-soft:#e7c878;
    --ink:#1c2b24;
    --ink-soft:#5b6d63;
    --line:#e2d8c2;
    --radius:18px;
    --font-quran: 'Amiri Quran', 'Amiri', serif;
    --font-ui: 'Tajawal', sans-serif;
    --font-lat: 'Cormorant Garamond', serif;
  }

  *{box-sizing:border-box; margin:0; padding:0;}

  html,body{
    font-family: var(--font-ui);
    background: var(--parchment);
    color: var(--ink);
    min-height:100vh;
    -webkit-tap-highlight-color: transparent;
  }

  body{
    display:flex;
    flex-direction:column;
    max-width:560px;
    margin:0 auto;
    min-height:100vh;
    position:relative;
    background: var(--parchment);
  }

  /* ===== Header ===== */
  header{
    position:sticky;
    top:0;
    z-index:30;
    background: linear-gradient(160deg, var(--emerald-deep), var(--emerald) 75%);
    color:#fdf8ec;
    padding:18px 18px 16px;
    box-shadow: 0 6px 18px -8px rgba(15,61,46,.55);
  }

  .header-top{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:10px;
  }

  .brand{
    display:flex;
    align-items:center;
    gap:10px;
  }

  .brand .mark{
    width:38px;height:38px;flex-shrink:0;
  }

  .brand-text h1{
    font-family: var(--font-quran);
    font-size:1.5rem;
    font-weight:700;
    letter-spacing:.5px;
    line-height:1.1;
  }
  .brand-text p{
    font-family: var(--font-lat);
    font-style:italic;
    font-size:.68rem;
    color: var(--gold-soft);
    letter-spacing:2px;
    text-transform:uppercase;
    margin-top:2px;
  }

  .icon-btn{
    background: rgba(255,255,255,.08);
    border:1px solid rgba(255,255,255,.18);
    color:#fdf8ec;
    width:38px;height:38px;
    border-radius:50%;
    display:flex;align-items:center;justify-content:center;
    cursor:pointer;
    font-size:1.05rem;
    transition: background .2s, transform .2s;
    flex-shrink:0;
  }
  .icon-btn:active{ transform: scale(.92); }
  .icon-btn:hover{ background: rgba(255,255,255,.16); }

  .search-wrap{
    margin-top:14px;
    position:relative;
  }
  .search-wrap input{
    width:100%;
    padding:11px 44px 11px 16px;
    border-radius:14px;
    border:1px solid rgba(255,255,255,.18);
    background: rgba(255,255,255,.08);
    color:#fdf8ec;
    font-family: var(--font-ui);
    font-size:.92rem;
    outline:none;
  }
  .search-wrap input::placeholder{ color: rgba(253,248,236,.55); }
  .search-wrap input:focus{ border-color: var(--gold-soft); background: rgba(255,255,255,.13); }
  .search-wrap .si{
    position:absolute;
    inset-inline-end:14px;
    top:50%; transform:translateY(-50%);
    color: var(--gold-soft);
    font-size:1rem;
    pointer-events:none;
  }

  .header-pattern{
    height:8px;
    margin-top:14px;
    background-image: repeating-linear-gradient(135deg, var(--gold-soft) 0 6px, transparent 6px 14px);
    opacity:.55;
    border-radius:4px;
  }

  /* ===== Main / views ===== */
  main{
    flex:1;
    padding:16px;
    padding-bottom:90px;
  }
  .view{ display:none; }
  .view.active{ display:block; }

  /* Continue reading card */
  .continue-card{
    background: linear-gradient(135deg, var(--gold-soft), var(--gold));
    border-radius: var(--radius);
    padding:14px 16px;
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:12px;
    margin-bottom:16px;
    color: var(--emerald-deep);
    box-shadow: 0 8px 20px -10px rgba(200,147,43,.7);
    cursor:pointer;
    border:1px solid rgba(255,255,255,.4);
  }
  .continue-card .cc-left{ display:flex; align-items:center; gap:12px; }
  .continue-card .cc-icon{
    width:42px;height:42px;border-radius:12px;
    background: rgba(15,61,46,.12);
    display:flex;align-items:center;justify-content:center;
    font-size:1.2rem;
  }
  .continue-card .cc-text .l1{ font-size:.72rem; opacity:.75; font-weight:700; letter-spacing:.5px;}
  .continue-card .cc-text .l2{ font-family: var(--font-quran); font-size:1.05rem; margin-top:2px; }
  .continue-card .cc-arrow{ font-size:1.2rem; }

  /* Section label */
  .section-label{
    display:flex; align-items:center; gap:10px;
    font-size:.78rem; font-weight:700; color: var(--ink-soft);
    letter-spacing:1px; text-transform:uppercase; font-family: var(--font-lat); font-style:italic;
    margin: 6px 0 12px;
  }
  .section-label::after{
    content:""; flex:1; height:1px; background: var(--line);
  }

  /* Surah list */
  .surah-list{ display:flex; flex-direction:column; gap:10px; }

  .surah-card{
    display:flex;
    align-items:center;
    gap:14px;
    background:#fff;
    border:1px solid var(--line);
    border-radius: var(--radius);
    padding:12px 14px;
    cursor:pointer;
    transition: transform .15s, box-shadow .15s, border-color .15s;
  }
  .surah-card:active{ transform: scale(.985); }
  .surah-card:hover{ border-color: var(--gold); box-shadow:0 8px 20px -14px rgba(15,61,46,.4); }

  .surah-num{
    position:relative;
    width:42px;height:42px;flex-shrink:0;
    display:flex;align-items:center;justify-content:center;
    color: var(--emerald-deep);
    font-weight:700;
    font-family: var(--font-lat);
    font-size:1rem;
  }
  .surah-num svg{ position:absolute; inset:0; width:100%; height:100%; }
  .surah-num span{ position:relative; z-index:1; }

  .surah-info{ flex:1; min-width:0; }
  .surah-info .ar-name{
    font-family: var(--font-quran);
    font-size:1.25rem;
    color: var(--emerald-deep);
    line-height:1.3;
  }
  .surah-info .meta{
    display:flex; gap:8px; align-items:center;
    font-size:.74rem; color: var(--ink-soft); margin-top:3px;
    font-family: var(--font-lat); font-style:italic;
  }
  .surah-info .meta .dot{ width:3px;height:3px;border-radius:50%; background:var(--ink-soft); }

  .surah-chev{ color: var(--gold); font-size:1.1rem; flex-shrink:0; }

  /* Empty state */
  .empty-state{
    text-align:center; padding:60px 20px; color: var(--ink-soft);
  }
  .empty-state .es-icon{ font-size:2.2rem; margin-bottom:10px; }
  .empty-state h3{ font-family: var(--font-quran); font-size:1.2rem; color: var(--emerald-deep); margin-bottom:6px; }
  .empty-state p{ font-size:.85rem; line-height:1.6; }

  /* ===== Surah reader view ===== */
  .reader-bar{
    display:flex; align-items:center; gap:10px; margin-bottom:14px;
  }
  .reader-bar .back-btn{
    background: var(--sage); color: var(--emerald-deep);
    border:none; width:38px;height:38px;border-radius:50%;
    display:flex; align-items:center; justify-content:center;
    font-size:1.1rem; cursor:pointer; flex-shrink:0;
  }
  .reader-title{ flex:1; min-width:0; }
  .reader-title .rt-ar{
    font-family: var(--font-quran); font-size:1.3rem; color: var(--emerald-deep);
  }
  .reader-title .rt-sub{
    font-size:.72rem; color: var(--ink-soft); font-family: var(--font-lat); font-style:italic; margin-top:1px;
  }

  .reader-tools{
    display:flex; gap:8px; margin-bottom:16px; flex-wrap:wrap;
  }
  .tool-btn{
    background:#fff; border:1px solid var(--line); color: var(--ink);
    border-radius:12px; padding:8px 12px; font-size:.78rem; font-family: var(--font-ui);
    display:flex; align-items:center; gap:6px; cursor:pointer;
    transition: border-color .15s, color .15s;
  }
  .tool-btn.active{ border-color: var(--gold); color: var(--emerald-deep); background: var(--sage); }
  .tool-btn .ti{ font-size:.85rem; }

  /* Bismillah */
  .bismillah{
    text-align:center; font-family: var(--font-quran);
    font-size:1.7rem; color: var(--emerald-deep);
    padding:18px 10px 22px;
    border-bottom:1px solid var(--line);
    margin-bottom:18px;
  }

  /* Ayah block */
  .surah-text{
    background:#fff;
    border:1px solid var(--line);
    border-radius: var(--radius);
    padding:22px 18px;
    line-height: 2.6;
    font-family: var(--font-quran);
    text-align: justify;
    direction: rtl;
  }
  .ayah{
    display:inline;
    cursor:pointer;
    border-radius:6px;
    transition: background .2s;
    padding:2px 1px;
  }
  .ayah.playing{ background: rgba(200,147,43,.18); }
  .ayah-marker{
    display:inline-flex; align-items:center; justify-content:center;
    width:1.9em; height:1.9em; vertical-align:middle;
    margin: 0 .15em;
    position:relative;
    font-family: var(--font-lat); font-weight:600;
    font-size:.6em;
    color: var(--gold);
  }
  .ayah-marker svg{ position:absolute; inset:0; width:100%; height:100%; }
  .ayah-marker span{ position:relative; z-index:1; }

  .translation-block{
    font-family: var(--font-ui);
    direction:ltr;
    text-align:left;
    font-size:.85rem;
    color: var(--ink-soft);
    margin-top:6px;
    padding-top:6px;
    border-top:1px dashed var(--line);
    display:none;
  }
  .show-translation .translation-block{ display:block; }
  .show-translation .ayah-translation-wrap{
    display:block;
    margin-bottom:14px;
    padding-bottom:8px;
    border-bottom:1px solid var(--line);
  }
  .ayah-translation-wrap{ display:inline; }

  .loading, .error-box{
    text-align:center; padding:50px 10px; color: var(--ink-soft);
  }
  .loading .spinner{
    width:34px; height:34px; margin:0 auto 14px;
    border:3px solid var(--line); border-top-color: var(--gold);
    border-radius:50%;
    animation: spin 0.9s linear infinite;
  }
  @keyframes spin{ to{ transform: rotate(360deg); } }
  .error-box h3{ color:#b3452e; font-family: var(--font-quran); margin-bottom:6px; font-size:1.1rem; }
  .error-box button{
    margin-top:12px; background: var(--emerald); color:#fff; border:none;
    padding:9px 18px; border-radius:10px; font-family: var(--font-ui); cursor:pointer;
  }

  /* Audio player bar */
  .audio-bar{
    position:fixed; bottom:0; left:0; right:0;
    max-width:560px; margin:0 auto;
    background: linear-gradient(160deg, var(--emerald-deep), var(--emerald) 80%);
    color:#fdf8ec;
    padding:12px 18px;
    display:none;
    align-items:center; gap:12px;
    box-shadow: 0 -8px 20px -10px rgba(15,61,46,.5);
    z-index:40;
  }
  .audio-bar.active{ display:flex; }
  .audio-bar .ab-info{ flex:1; min-width:0; }
  .audio-bar .ab-info .l1{ font-size:.7rem; color: var(--gold-soft); letter-spacing:1px; }
  .audio-bar .ab-info .l2{ font-family: var(--font-quran); font-size:1rem; margin-top:2px; }
  .audio-bar .ab-btn{
    background: rgba(255,255,255,.1); border:1px solid rgba(255,255,255,.2);
    color:#fdf8ec; width:38px;height:38px;border-radius:50%;
    display:flex;align-items:center;justify-content:center; font-size:1rem; cursor:pointer; flex-shrink:0;
  }

  /* bottom nav */
  nav.bottom-nav{
    position:fixed; bottom:0; left:0; right:0;
    max-width:560px; margin:0 auto;
    background:#fff; border-top:1px solid var(--line);
    display:flex; z-index:35;
  }
  nav.bottom-nav.hidden{ display:none; }
  nav.bottom-nav button{
    flex:1; background:none; border:none; padding:10px 0 8px;
    display:flex; flex-direction:column; align-items:center; gap:3px;
    color: var(--ink-soft); font-family: var(--font-ui); font-size:.68rem; cursor:pointer;
  }
  nav.bottom-nav button .nav-icon{ font-size:1.15rem; }
  nav.bottom-nav button.active{ color: var(--emerald-deep); }
  nav.bottom-nav button.active .nav-icon{ color: var(--gold); }

  @media (min-width:600px){
    body{ border-inline:1px solid var(--line); }
  }
</style>
</head>
<body>

<header>
  <div class="header-top">
    <div class="brand">
      <svg class="mark" viewBox="0 0 100 100" aria-hidden="true">
        <g fill="none" stroke="#e7c878" stroke-width="2">
          <circle cx="50" cy="50" r="46"/>
          <path d="M50 6 L73 28 L94 50 L73 72 L50 94 L27 72 L6 50 L27 28 Z"/>
          <circle cx="50" cy="50" r="30"/>
        </g>
      </svg>
      <div class="brand-text">
        <h1>القرآن الكريم</h1>
        <p>Holy Quran</p>
      </div>
    </div>
    <button class="icon-btn" id="reloadBtn" title="تحديث">↻</button>
  </div>
  <div class="search-wrap">
    <input type="text" id="searchInput" placeholder="ابحث عن سورة بالاسم أو الرقم...">
    <span class="si">🔍</span>
  </div>
  <div class="header-pattern"></div>
</header>

<main>

  <!-- HOME VIEW -->
  <div class="view active" id="view-home">
    <div id="continueCard"></div>
    <div class="section-label">فهرس السور — 114</div>
    <div class="surah-list" id="surahList">
      <div class="loading"><div class="spinner"></div>جاري تحميل فهرس السور...</div>
    </div>
  </div>

  <!-- READER VIEW -->
  <div class="view" id="view-reader">
    <div class="reader-bar">
      <button class="back-btn" id="backBtn">→</button>
      <div class="reader-title">
        <div class="rt-ar" id="readerTitleAr">—</div>
        <div class="rt-sub" id="readerTitleSub">—</div>
      </div>
    </div>
    <div class="reader-tools">
      <button class="tool-btn" id="fontMinus"><span class="ti">−</span> الخط</button>
      <button class="tool-btn" id="fontPlus"><span class="ti">+</span> الخط</button>
      <button class="tool-btn" id="translationToggle"><span class="ti">A</span> الترجمة</button>
      <button class="tool-btn" id="playSurahBtn"><span class="ti">▶</span> تشغيل السورة</button>
    </div>
    <div id="readerContent"></div>
  </div>

</main>

<div class="audio-bar" id="audioBar">
  <div class="ab-info">
    <div class="l1">يتم الاستماع الآن</div>
    <div class="l2" id="audioLabel">—</div>
  </div>
  <button class="ab-btn" id="audioToggle">⏸</button>
  <button class="ab-btn" id="audioStop">✕</button>
</div>

<nav class="bottom-nav" id="bottomNav">
  <button class="active" id="navHome"><span class="nav-icon">🏠</span>الرئيسية</button>
  <button id="navContinue"><span class="nav-icon">📖</span>المتابعة</button>
</nav>

<audio id="player" preload="none"></audio>

<script>
(function(){
  const API = 'https://api.alquran.cloud/v1';
  const RECITER = 'ar.alafasy';

  const $ = sel => document.querySelector(sel);
  const surahListEl = $('#surahList');
  const continueCardEl = $('#continueCard');
  const viewHome = $('#view-home');
  const viewReader = $('#view-reader');
  const bottomNav = $('#bottomNav');
  const readerContent = $('#readerContent');
  const readerTitleAr = $('#readerTitleAr');
  const readerTitleSub = $('#readerTitleSub');
  const player = $('#player');
  const audioBar = $('#audioBar');
  const audioLabel = $('#audioLabel');
  const audioToggle = $('#audioToggle');

  let surahs = [];
  let fontScale = 1;
  let showTranslation = false;
  let currentSurah = null;
  let currentAyahs = [];
  let playQueue = [];
  let playIndex = -1;
  let isPlayingSurah = false;

  // ---------- Decorative rosette SVG ----------
  function rosetteSVG(){
    return `<svg viewBox="0 0 44 44" aria-hidden="true">
      <g fill="none" stroke="#c8932b" stroke-width="1.4" opacity="0.85">
        <circle cx="22" cy="22" r="20"/>
        <path d="M22 2 L33 12 L42 22 L33 32 L22 42 L11 32 L2 22 L11 12 Z"/>
      </g>
    </svg>`;
  }
  function smallRosetteSVG(){
    return `<svg viewBox="0 0 30 30" aria-hidden="true">
      <g fill="none" stroke="#c8932b" stroke-width="1.3">
        <circle cx="15" cy="15" r="13.5"/>
        <path d="M15 1.5 L23 7 L28.5 15 L23 23 L15 28.5 L7 23 L1.5 15 L7 7 Z"/>
      </g>
    </svg>`;
  }

  // ---------- Storage helpers ----------
  async function saveLastRead(surahNum, ayahNum){
    try{
      await window.storage.set('lastRead', JSON.stringify({surah: surahNum, ayah: ayahNum, ts: Date.now()}), false);
    }catch(e){ console.error('storage set failed', e); }
  }
  async function getLastRead(){
    try{
      const r = await window.storage.get('lastRead', false);
      return r ? JSON.parse(r.value) : null;
    }catch(e){ return null; }
  }

  // ---------- Number formatting (Arabic-Indic digits) ----------
  function arNum(n){
    const map = ['٠','١','٢','٣','٤','٥','٦','٧','٨','٩'];
    return String(n).split('').map(c => /[0-9]/.test(c) ? map[c] : c).join('');
  }

  // ---------- Revelation place translation ----------
  function placeAr(place){
    return place === 'Meccan' ? 'مكية' : 'مدنية';
  }

  // ---------- Load surah index ----------
  async function loadSurahList(){
    try{
      const res = await fetch(`${API}/surah`);
      if(!res.ok) throw new Error('network');
      const data = await res.json();
      surahs = data.data;
      renderSurahList(surahs);
      renderContinueCard();
    }catch(err){
      surahListEl.innerHTML = `
        <div class="error-box">
          <h3>تعذّر تحميل الفهرس</h3>
          <p>يرجى التحقق من الاتصال بالإنترنت ثم إعادة المحاولة.</p>
          <button id="retryListBtn">إعادة المحاولة</button>
        </div>`;
      const retry = document.getElementById('retryListBtn');
      if(retry) retry.addEventListener('click', loadSurahList);
    }
  }

  function renderSurahList(list){
    if(!list.length){
      surahListEl.innerHTML = `
        <div class="empty-state">
          <div class="es-icon">🔍</div>
          <h3>لا توجد نتائج</h3>
          <p>لم يتم العثور على سورة مطابقة لبحثك. حاول كتابة اسم آخر أو رقم السورة.</p>
        </div>`;
      return;
    }
    surahListEl.innerHTML = list.map(s => `
      <div class="surah-card" data-num="${s.number}">
        <div class="surah-num">${smallRosetteSVG()}<span>${s.number}</span></div>
        <div class="surah-info">
          <div class="ar-name">${s.name}</div>
          <div class="meta">
            <span>${s.englishName} · ${s.englishNameTranslation}</span>
            <span class="dot"></span>
            <span>${placeAr(s.revelationType)}</span>
            <span class="dot"></span>
            <span>${arNum(s.numberOfAyahs)} آية</span>
          </div>
        </div>
        <div class="surah-chev">‹</div>
      </div>
    `).join('');

    surahListEl.querySelectorAll('.surah-card').forEach(card => {
      card.addEventListener('click', () => openSurah(parseInt(card.dataset.num, 10)));
    });
  }

  async function renderContinueCard(){
    const last = await getLastRead();
    if(!last || !surahs.length){ continueCardEl.innerHTML = ''; return; }
    const s = surahs.find(x => x.number === last.surah);
    if(!s){ continueCardEl.innerHTML = ''; return; }
    continueCardEl.innerHTML = `
      <div class="continue-card" id="continueCardInner">
        <div class="cc-left">
          <div class="cc-icon">📖</div>
          <div class="cc-text">
            <div class="l1">متابعة القراءة</div>
            <div class="l2">${s.name} — آية ${arNum(last.ayah)}</div>
          </div>
        </div>
        <div class="cc-arrow">‹</div>
      </div>`;
    document.getElementById('continueCardInner').addEventListener('click', () => openSurah(s.number, last.ayah));
  }

  // ---------- Search ----------
  $('#searchInput').addEventListener('input', e => {
    const q = e.target.value.trim().toLowerCase();
    if(!q){ renderSurahList(surahs); return; }
    const filtered = surahs.filter(s =>
      s.name.includes(q) ||
      s.englishName.toLowerCase().includes(q) ||
      s.englishNameTranslation.toLowerCase().includes(q) ||
      String(s.number) === q
    );
    renderSurahList(filtered);
  });

  // ---------- Open surah / reader ----------
  async function openSurah(number, scrollToAyah){
    currentSurah = surahs.find(s => s.number === number);
    viewHome.classList.remove('active');
    viewReader.classList.add('active');
    bottomNav.classList.add('hidden');
    readerTitleAr.textContent = currentSurah ? currentSurah.name : '...';
    readerTitleSub.textContent = currentSurah
      ? `${currentSurah.englishName} · ${placeAr(currentSurah.revelationType)} · ${arNum(currentSurah.numberOfAyahs)} آية`
      : '';
    readerContent.innerHTML = `<div class="loading"><div class="spinner"></div>جاري تحميل السورة...</div>`;
    window.scrollTo({top:0, behavior:'instant'});

    try{
      const [arRes, enRes] = await Promise.all([
        fetch(`${API}/surah/${number}/quran-uthmani`),
        fetch(`${API}/surah/${number}/en.sahih`)
      ]);
      if(!arRes.ok) throw new Error('network');
      const arData = (await arRes.json()).data;
      let enData = null;
      try{ if(enRes.ok) enData = (await enRes.json()).data; }catch(e){}

      currentAyahs = arData.ayahs.map((a, i) => ({
        number: a.number,
        numberInSurah: a.numberInSurah,
        text: a.text,
        translation: enData ? enData.ayahs[i].text : ''
      }));

      renderReader();
      saveLastRead(number, 1);

      if(scrollToAyah){
        requestAnimationFrame(() => {
          const el = document.getElementById(`ayah-${scrollToAyah}`);
          if(el) el.scrollIntoView({behavior:'smooth', block:'center'});
        });
      }
    }catch(err){
      readerContent.innerHTML = `
        <div class="error-box">
          <h3>تعذّر تحميل السورة</h3>
          <p>يرجى التحقق من الاتصال بالإنترنت ثم إعادة المحاولة.</p>
          <button id="retrySurahBtn">إعادة المحاولة</button>
        </div>`;
      document.getElementById('retrySurahBtn').addEventListener('click', () => openSurah(number, scrollToAyah));
    }
  }

  function renderReader(){
    const showBismillah = currentSurah.number !== 1 && currentSurah.number !== 9;
    let html = '';
    if(showBismillah){
      html += `<div class="bismillah">بِسْمِ اللَّهِ الرَّحْمَٰنِ الرَّحِيمِ</div>`;
    }
    html += `<div class="surah-text" id="surahTextBlock" style="font-size:${1.6*fontScale}rem">`;
    currentAyahs.forEach(a => {
      html += `<span class="ayah" id="ayah-${a.numberInSurah}" data-num="${a.numberInSurah}" data-global="${a.number}">`;
      html += `${a.text} `;
      html += `<span class="ayah-marker">${smallRosetteSVG()}<span>${arNum(a.numberInSurah)}</span></span>`;
      if(showTranslation && a.translation){
        html += `<div class="translation-block">${a.translation}</div>`;
      }
      html += `</span>`;
    });
    html += `</div>`;
    readerContent.innerHTML = html;
    readerContent.querySelector('.surah-text').classList.toggle('show-translation', showTranslation);

    readerContent.querySelectorAll('.ayah').forEach(el => {
      el.addEventListener('click', () => {
        const num = parseInt(el.dataset.num, 10);
        const globalNum = parseInt(el.dataset.global, 10);
        saveLastRead(currentSurah.number, num);
        playSingleAyah(globalNum, num);
      });
    });
  }

  // ---------- Font size ----------
  $('#fontMinus').addEventListener('click', () => {
    fontScale = Math.max(0.7, fontScale - 0.1);
    applyFontScale();
  });
  $('#fontPlus').addEventListener('click', () => {
    fontScale = Math.min(1.6, fontScale + 0.1);
    applyFontScale();
  });
  function applyFontScale(){
    const block = document.getElementById('surahTextBlock');
    if(block) block.style.fontSize = (1.6*fontScale) + 'rem';
  }

  // ---------- Translation toggle ----------
  $('#translationToggle').addEventListener('click', () => {
    showTranslation = !showTranslation;
    $('#translationToggle').classList.toggle('active', showTranslation);
    if(currentAyahs.length) renderReader();
  });

  // ---------- Audio ----------
  function audioUrl(globalNum){
    return `https://cdn.islamic.network/quran/audio/128/${RECITER}/${globalNum}.mp3`;
  }

  function highlightAyah(numberInSurah){
    document.querySelectorAll('.ayah.playing').forEach(el => el.classList.remove('playing'));
    const el = document.getElementById(`ayah-${numberInSurah}`);
    if(el){
      el.classList.add('playing');
      el.scrollIntoView({behavior:'smooth', block:'center'});
    }
  }

  function playSingleAyah(globalNum, numberInSurah){
    isPlayingSurah = false;
    playQueue = [];
    player.src = audioUrl(globalNum);
    player.play().catch(()=>{});
    audioBar.classList.add('active');
    audioLabel.textContent = `${currentSurah.name} — آية ${arNum(numberInSurah)}`;
    audioToggle.textContent = '⏸';
    highlightAyah(numberInSurah);
  }

  $('#playSurahBtn').addEventListener('click', () => {
    if(!currentAyahs.length) return;
    isPlayingSurah = true;
    playQueue = currentAyahs.map(a => ({global: a.number, num: a.numberInSurah}));
    playIndex = -1;
    audioBar.classList.add('active');
    nextInQueue();
  });

  function nextInQueue(){
    playIndex++;
    if(playIndex >= playQueue.length){
      isPlayingSurah = false;
      audioBar.classList.remove('active');
      document.querySelectorAll('.ayah.playing').forEach(el => el.classList.remove('playing'));
      return;
    }
    const item = playQueue[playIndex];
    player.src = audioUrl(item.global);
    player.play().catch(()=>{});
    audioLabel.textContent = `${currentSurah.name} — آية ${arNum(item.num)}`;
    audioToggle.textContent = '⏸';
    highlightAyah(item.num);
    saveLastRead(currentSurah.number, item.num);
  }

  player.addEventListener('ended', () => {
    if(isPlayingSurah){ nextInQueue(); }
    else{
      audioBar.classList.remove('active');
      document.querySelectorAll('.ayah.playing').forEach(el => el.classList.remove('playing'));
    }
  });

  audioToggle.addEventListener('click', () => {
    if(player.paused){
      player.play().catch(()=>{});
      audioToggle.textContent = '⏸';
    }else{
      player.pause();
      audioToggle.textContent = '▶';
    }
  });

  $('#audioStop').addEventListener('click', () => {
    player.pause();
    player.removeAttribute('src');
    isPlayingSurah = false;
    playQueue = [];
    audioBar.classList.remove('active');
    document.querySelectorAll('.ayah.playing').forEach(el => el.classList.remove('playing'));
  });

  // ---------- Navigation ----------
  $('#backBtn').addEventListener('click', () => {
    viewReader.classList.remove('active');
    viewHome.classList.add('active');
    bottomNav.classList.remove('hidden');
    renderContinueCard();
  });

  $('#navHome').addEventListener('click', () => {
    viewReader.classList.remove('active');
    viewHome.classList.add('active');
    $('#navHome').classList.add('active');
    $('#navContinue').classList.remove('active');
    renderContinueCard();
  });

  $('#navContinue').addEventListener('click', async () => {
    const last = await getLastRead();
    if(last){
      $('#navHome').classList.remove('active');
      $('#navContinue').classList.add('active');
      bottomNav.classList.remove('hidden');
      openSurah(last.surah, last.ayah);
    }
  });

  $('#reloadBtn').addEventListener('click', () => {
    if(viewReader.classList.contains('active') && currentSurah){
      openSurah(currentSurah.number);
    }else{
      loadSurahList();
    }
  });

  // ---------- Init ----------
  loadSurahList();
})();
</script>
</body>
</html>
